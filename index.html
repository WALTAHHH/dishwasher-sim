<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dishwasher Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <!-- Title Screen -->
        <div id="title-screen" class="screen active">
            <h1>🧽 Dishwasher Simulator</h1>
            <p class="tagline">Clean dishes. Clear mind.</p>
            <div class="menu">
                <button id="btn-start">Start Shift</button>
                <button id="btn-endless" disabled>Endless Mode</button>
                <button id="btn-settings" disabled>Settings</button>
            </div>
            <p class="hint">WASD to move • SPACE to grab • SHIFT to rotate</p>
        </div>

        <!-- Game Screen -->
        <div id="game-screen" class="screen">
            <!-- Station: Intake -->
            <div id="station-intake" class="station">
                <h3>📥 Intake</h3>
                <div class="intake-queue"></div>
            </div>

            <!-- Station: Dishwasher (Tetris Grid) -->
            <div id="station-dishwasher" class="station">
                <h3>🫧 Dishwasher</h3>
                <div class="dishwasher-container">
                    <div class="dishwasher-grid"></div>
                    <div class="dishwasher-controls">
                        <button id="btn-run-cycle" disabled>Run Cycle</button>
                        <div class="cycle-timer hidden">
                            <div class="timer-bar"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Station: Drying Rack -->
            <div id="station-drying" class="station">
                <h3>💨 Drying Rack</h3>
                <div class="drying-slots"></div>
            </div>

            <!-- Station: Storage -->
            <div id="station-storage" class="station">
                <h3>📦 Storage</h3>
                <div class="storage-shelves">
                    <div class="shelf" data-type="plate">Plates</div>
                    <div class="shelf" data-type="bowl">Bowls</div>
                    <div class="shelf" data-type="cup">Cups</div>
                </div>
            </div>

            <!-- HUD -->
            <div id="hud">
                <div class="hud-item">
                    <span class="label">Wave</span>
                    <span id="hud-wave">1/3</span>
                </div>
                <div class="hud-item">
                    <span class="label">Time</span>
                    <span id="hud-time">3:00</span>
                </div>
                <div class="hud-item">
                    <span class="label">Clean</span>
                    <span id="hud-clean">0</span>
                </div>
            </div>

            <!-- Held Item Display -->
            <div id="held-item" class="hidden">
                <div class="held-dish"></div>
            </div>

            <!-- Cursor -->
            <div id="cursor"></div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" class="screen">
            <h2>Shift Complete!</h2>
            <div class="results">
                <div class="stat">
                    <span class="label">Dishes Cleaned</span>
                    <span id="result-cleaned">0</span>
                </div>
                <div class="stat">
                    <span class="label">Efficiency</span>
                    <span id="result-efficiency">0%</span>
                </div>
                <div class="stat">
                    <span class="label">Rating</span>
                    <span id="result-rating">⭐⭐⭐</span>
                </div>
            </div>
            <button id="btn-retry">Try Again</button>
            <button id="btn-menu">Main Menu</button>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
